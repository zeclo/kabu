    function drawAll() {
      const root = document.getElementById('charts');
      stocks.forEach((s, i) => {
        const section = document.createElement('section');
        section.className = 'stock';
        section.innerHTML = `<div class="label">${s.code} ${s.name}</div><div id="candle_${i}" class="candle"></div><div id="volume_${i}" class="volume"></div>`;
        root.appendChild(section);

        const candleData = new google.visualization.DataTable(); //OHLCの並びが独特だが、これはGooogleChartの仕様
        candleData.addColumn('string', 'Date');
        candleData.addColumn('number', 'Low');
        candleData.addColumn('number', 'Open');
        candleData.addColumn('number', 'Close');
        candleData.addColumn('number', 'High');
        
        candleData.addRows(
          s.rows.map(r => [
            r[0],
            r[3], // Low
            r[1], // Open
            r[4], // Close
            r[2]  // High
          ])
        );

        const volumeData = new google.visualization.DataTable();
        volumeData.addColumn('string', 'Date');
        volumeData.addColumn('number', 'Volume');
        volumeData.addRows(s.rows.map(r => [r[0], r[5]]));

        new google.visualization.CandlestickChart(document.getElementById(`candle_${i}`)).draw(candleData, {
          legend: 'none',
          bar: { groupWidth: '70%' },
          candlestick: {
            fallingColor: { strokeWidth: 0, fill: '#1b5e20' },
            risingColor: { strokeWidth: 0, fill: '#b71c1c' }
          },
          chartArea: { left: 60, top: 20, width: '86%', height: '76%' }
        });

        new google.visualization.ColumnChart(document.getElementById(`volume_${i}`)).draw(volumeData, {
          legend: 'none',
          colors: ['#455a64'],
          chartArea: { left: 60, top: 10, width: '86%', height: '60%' },
          hAxis: { slantedText: false}
        });
      });

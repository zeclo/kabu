    async function fetchHistory(code) {
      const url = https://query1.finance.yahoo.com/v8/finance/chart/.T?range=max&interval=1d&events=history;
      const res = await fetch(url);
      if (!res.ok) throw new Error(HTTP );
      const payload = await res.json();
      const result = payload?.chart?.result?.[0];
      if (!result) throw new Error('chart result not found');

      const t = result.timestamp || [];
      const q = result.indicators?.quote?.[0] || {};
      const opens = q.open || [];
      const highs = q.high || [];
      const lows = q.low || [];
      const closes = q.close || [];
      const volumes = q.volume || [];

      const rows = [];
      for (let i = 0; i < t.length; i++) {
        const o = opens[i], h = highs[i], l = lows[i], c = closes[i], v = volumes[i];
        if ([o,h,l,c,v].some(x => x === null || x === undefined)) continue;
        rows.push([new Date(t[i] * 1000), Number(l), Number(o), Number(c), Number(h), Number(v)]);
      }
      return rows;
    }

    function drawCharts(idPrefix, rows) {
      const priceData = new google.visualization.DataTable();
      priceData.addColumn('date', 'Date');
      priceData.addColumn('number', 'Low');
      priceData.addColumn('number', 'Open');
      priceData.addColumn('number', 'Close');
      priceData.addColumn('number', 'High');
      priceData.addRows(rows.map(r => [r[0], r[1], r[2], r[3], r[4]]));

      const volumeData = new google.visualization.DataTable();
      volumeData.addColumn('date', 'Date');
      volumeData.addColumn('number', 'Volume');
      volumeData.addRows(rows.map(r => [r[0], r[5]]));

      const priceChart = new google.visualization.CandlestickChart(document.getElementById(${idPrefix}-price));
      priceChart.draw(priceData, {
        legend: 'none',
        candlestick: { fallingColor: { strokeWidth: 0, fill: '#1b5e20' }, risingColor: { strokeWidth: 0, fill: '#c62828' } },
        chartArea: { left: 55, right: 20, top: 10, bottom: 40 },
        hAxis: { format: 'yyyy/MM', gridlines: { color: '#eceff4' } },
        vAxis: { gridlines: { color: '#eceff4' } }
      });

      const volumeChart = new google.visualization.ColumnChart(document.getElementById(${idPrefix}-volume));
      volumeChart.draw(volumeData, {
        legend: 'none',
        chartArea: { left: 55, right: 20, top: 10, bottom: 35 },
        hAxis: { format: 'yyyy/MM', gridlines: { color: '#eceff4' } },
        vAxis: { gridlines: { color: '#eceff4' } },

      });
    }

    function toNum(v) {
      if (v == null) return null;
      const n = Number(String(v).replace(/,/g, ''));
      return Number.isFinite(n) ? n : null;
    }

    function parseHistoryMarkdown(md) {
      const totalMatch = md.match(/\/(\d[\d,]*)件/);
      const total = totalMatch ? Number(totalMatch[1].replace(/,/g, '')) : null;
      const rows = [];
      const re = /^\|\s*(\d{4}\/\d{1,2}\/\d{1,2})\s*\|\s*([\d,.-]+)\s*\|\s*([\d,.-]+)\s*\|\s*([\d,.-]+)\s*\|\s*([\d,.-]+)\s*\|\s*([\d,.-]+)\s*\|\s*$/gm;
      let m;
      while ((m = re.exec(md)) !== null) {
        const open = toNum(m[2]);
        const high = toNum(m[3]);
        const low = toNum(m[4]);
        const close = toNum(m[5]);
        const volume = toNum(m[6]);
        if ([open, high, low, close, volume].some(v => v == null)) continue;
        const parts = m[1].split('/').map(Number);
        rows.push({
          dateText: m[1],
          dateObj: new Date(parts[0], parts[1] - 1, parts[2]),
          open,
          high,
          low,
          close,
          volume
        });
      }
      return { total, rows };
    }

    async function fetchAllHistory(code, statusEl) {
      const map = new Map();
      let total = null;
      let page = 1;
      while (page <= 600) {
        statusEl.textContent = 取得中: .T page ;
        const url = https://r.jina.ai/http://finance.yahoo.co.jp/quote/.T/history?page=;
        const res = await fetch(url);
        if (!res.ok) break;
        const md = await res.text();
        const parsed = parseHistoryMarkdown(md);
        if (total == null && parsed.total != null) total = parsed.total;
        if (parsed.rows.length === 0) break;
        for (const r of parsed.rows) map.set(r.dateText, r);
        if (total != null && map.size >= total) break;
        if (parsed.rows.length < 20) break;
        page += 1;
      }
      const out = Array.from(map.values());
      out.sort((a, b) => a.dateObj - b.dateObj);
      return out;
    }

    function drawCharts(item, rows, priceDiv, volumeDiv) {
      const priceData = new google.visualization.DataTable();
      priceData.addColumn('date', 'Date');
      priceData.addColumn('number', 'Low');
      priceData.addColumn('number', 'Open');
      priceData.addColumn('number', 'Close');
      priceData.addColumn('number', 'High');
      priceData.addRows(rows.map(r => [r.dateObj, r.low, r.open, r.close, r.high]));

      const volumeData = new google.visualization.DataTable();
      volumeData.addColumn('date', 'Date');
      volumeData.addColumn('number', 'Volume');
      volumeData.addRows(rows.map(r => [r.dateObj, r.volume]));

      const candlestick = new google.visualization.CandlestickChart(priceDiv);
      candlestick.draw(priceData, {
        legend: 'none',
        bar: { groupWidth: '75%' },
        candlestick: {
          fallingColor: { strokeWidth: 0, fill: '#2563eb' },
          risingColor: { strokeWidth: 0, fill: '#ef4444' }
        },
        chartArea: { left: 65, right: 20, top: 12, bottom: 36 },
        hAxis: { format: 'yyyy/MM', slantedText: true, slantedTextAngle: 45 },
        vAxis: { textPosition: 'out' }
      });

      const volumeChart = new google.visualization.ColumnChart(volumeDiv);
      volumeChart.draw(volumeData, {
        legend: 'none',
        colors: ['#94a3b8'],
        chartArea: { left: 65, right: 20, top: 8, bottom: 28 },
        hAxis: { format: 'yyyy/MM', slantedText: false },
        vAxis: { textPosition: 'out' }
      });
    }

    async function init() {
      const root = document.getElementById('root');
      for (const item of items) {
        const card = document.createElement('section');
        card.className = 'card';
        card.innerHTML = 
          <h2 class="title"> </h2>
          <p class="sub">株価:  / 出来高:  / 出来高倍率:  / 時価総額(百万円): </p>
          <div class="status">準備中...</div>
          <div class="priceChart"></div>
          <div class="volumeChart"></div>
        ;
        root.appendChild(card);
        const status = card.querySelector('.status');
        const priceDiv = card.querySelector('.priceChart');
        const volumeDiv = card.querySelector('.volumeChart');
        try {
          const rows = await fetchAllHistory(item['銘柄コード'], status);
          if (!rows.length) {
            status.textContent = '履歴データを取得できませんでした';
            continue;
          }
          drawCharts(item, rows, priceDiv, volumeDiv);
          status.textContent = 取得件数: ;
        } catch (e) {
          status.textContent = エラー: ;
        }
      }
    }

<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>対象銘柄チャート 20260223</title>
  <script src="https://www.gstatic.com/charts/loader.js"></script>
  <style>
    :root {
      --bg: #f5f7fb;
      --fg: #1c2434;
      --card: #ffffff;
      --line: #d8dfeb;
      --up: #d54b4b;
      --down: #2f6ed3;
    }
    body { margin: 0; font-family: "Yu Gothic UI", "Meiryo", sans-serif; background: linear-gradient(180deg, #eef3ff, #f8fbff); color: var(--fg); }
    .wrap { max-width: 1200px; margin: 0 auto; padding: 20px; }
    h1 { margin: 0 0 16px; font-size: 24px; }
    .meta { font-size: 13px; color: #4b5a76; margin-bottom: 14px; }
    .card { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 14px; margin-bottom: 16px; box-shadow: 0 2px 10px rgba(25, 40, 90, .06); }
    .title { font-weight: 700; margin-bottom: 8px; }
    .grid { display: grid; grid-template-rows: 360px 140px; gap: 8px; }
    .err { color: #a32020; font-size: 13px; }
    @media (max-width: 720px) {
      .wrap { padding: 12px; }
      .grid { grid-template-rows: 300px 120px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>時価総額200億円以下 対象銘柄チャート</h1>
    <div class="meta">作成日: 20260223 / 期間: Yahooデータの全期間（日足、休日列なし）</div>
    <div id="app"></div>
  </div>

<script>
const SYMBOLS = [
    {
        "code":  "6356",
        "name":  "日本ギア工業(株)",
        "marketCap":  "29.6億"
    },
    {
        "code":  "2370",
        "name":  "(株)メディネット",
        "marketCap":  "151.4億"
    },
    {
        "code":  "6775",
        "name":  "(株)ＴＢグループ",
        "marketCap":  "71.8億"
    },
    {
        "code":  "6522",
        "name":  "(株)アスタリスク",
        "marketCap":  "28.2億"
    },
    {
        "code":  "8946",
        "name":  "(株)ＡＳＩＡＮ ＳＴＡＲ",
        "marketCap":  "42.2億"
    },
    {
        "code":  "3858",
        "name":  "(株)ユビキタスＡＩ",
        "marketCap":  "91.0億"
    },
    {
        "code":  "3920",
        "name":  "アイビーシー(株)",
        "marketCap":  "52.2億"
    },
    {
        "code":  "5909",
        "name":  "(株)コロナ",
        "marketCap":  "160.7億"
    }
];

google.charts.load('current', { packages: ['corechart'] });
google.charts.setOnLoadCallback(drawAll);

async function fetchSeries(code) {
  const url = https://query1.finance.yahoo.com/v8/finance/chart/.T?range=max&interval=1d&events=history;
  const res = await fetch(url);
  if (!res.ok) throw new Error(HTTP );
  const json = await res.json();
  const r = json?.chart?.result?.[0];
  if (!r) throw new Error('データなし');
  const ts = r.timestamp || [];
  const q = r.indicators?.quote?.[0] || {};
  const o = q.open || [], h = q.high || [], l = q.low || [], c = q.close || [], v = q.volume || [];
  const rows = [];
  for (let i = 0; i < ts.length; i++) {
    if ([o[i], h[i], l[i], c[i], v[i]].some(x => x == null)) continue;
    rows.push([new Date(ts[i] * 1000), Number(l[i]), Number(o[i]), Number(c[i]), Number(h[i]), Number(v[i])]);
  }
  return rows;
}

function drawCharts(container, label, rows) {
  const candleData = new google.visualization.DataTable();
  candleData.addColumn('date', 'Date');
  candleData.addColumn('number', 'Low');
  candleData.addColumn('number', 'Open');
  candleData.addColumn('number', 'Close');
  candleData.addColumn('number', 'High');
  candleData.addRows(rows.map(r => [r[0], r[1], r[2], r[3], r[4]]));

  const volumeData = new google.visualization.DataTable();
  volumeData.addColumn('date', 'Date');
  volumeData.addColumn('number', 'Volume');
  volumeData.addRows(rows.map(r => [r[0], r[5]]));

  const top = container.querySelector('.candle');
  const bottom = container.querySelector('.volume');

  const candleChart = new google.visualization.CandlestickChart(top);
  candleChart.draw(candleData, {
    legend: 'none',
    chartArea: { left: 70, top: 20, width: '84%', height: '78%' },
    candlestick: {
      fallingColor: { strokeWidth: 0, fill: getComputedStyle(document.documentElement).getPropertyValue('--down').trim() },
      risingColor: { strokeWidth: 0, fill: getComputedStyle(document.documentElement).getPropertyValue('--up').trim() }
    },
    hAxis: { format: 'yyyy/MM' },
    vAxis: { textPosition: 'out' },
    title: label
  });

  const volumeChart = new google.visualization.ColumnChart(bottom);
  volumeChart.draw(volumeData, {
    legend: 'none',
    chartArea: { left: 70, top: 8, width: '84%', height: '72%' },
    hAxis: { format: 'yyyy/MM', textPosition: 'none' },
    vAxis: { textPosition: 'out' },
    colors: ['#6e7f99']
  });

  window.addEventListener('resize', () => {
    candleChart.draw(candleData, {
      legend: 'none',
      chartArea: { left: 70, top: 20, width: '84%', height: '78%' },
      candlestick: {
        fallingColor: { strokeWidth: 0, fill: getComputedStyle(document.documentElement).getPropertyValue('--down').trim() },
        risingColor: { strokeWidth: 0, fill: getComputedStyle(document.documentElement).getPropertyValue('--up').trim() }
      },
      hAxis: { format: 'yyyy/MM' },
      vAxis: { textPosition: 'out' },
      title: label
    });
    volumeChart.draw(volumeData, {
      legend: 'none',
      chartArea: { left: 70, top: 8, width: '84%', height: '72%' },
      hAxis: { format: 'yyyy/MM', textPosition: 'none' },
      vAxis: { textPosition: 'out' },
      colors: ['#6e7f99']
    });
  }, { passive: true });
}

async function drawAll() {
  const app = document.getElementById('app');
  for (const s of SYMBOLS) {
    const card = document.createElement('section');
    card.className = 'card';
    card.innerHTML = <div class="title">  / 時価総額 </div><div class="grid"><div class="candle"></div><div class="volume"></div></div><div class="err"></div>;
    app.appendChild(card);
    try {
      const rows = await fetchSeries(s.code);
      drawCharts(card, ${s.code} , rows);
    } catch (e) {
      card.querySelector('.err').textContent = データ取得失敗: ;
    }
  }
}
</script>
</body>
</html>
